<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>G4M3V4ULT</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #000;
    --card: #0d0d0d;
    --border: rgba(255,255,255,0.07);
    --border-h: rgba(255,255,255,0.2);
    --muted: rgba(255,255,255,0.42);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: #fff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── FIREFLY CANVAS ── */
  #canvas {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  #app { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2.5rem;
    height: 66px;
    display: flex; align-items: center; justify-content: space-between;
  }

  .logo { display: flex; align-items: center; gap: 11px; text-decoration: none; user-select: none; }
  .logo-icon { width: 36px; height: 36px; flex-shrink: 0; }
  .logo-text { display: flex; flex-direction: column; line-height: 1; }
  .logo-main { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 1.2rem; letter-spacing: 0.12em; color: #fff; }
  .logo-sub  { font-size: 0.58rem; letter-spacing: 0.38em; color: var(--muted); text-transform: uppercase; margin-top: 3px; }

  .header-right { display: flex; align-items: center; gap: 1rem; }
  .count-badge { font-size: 0.78rem; letter-spacing: 0.1em; color: var(--muted); white-space: nowrap; }

  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: .4; pointer-events: none; }
  #search {
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: #fff; font-family: 'Rajdhani', sans-serif; font-size: 0.93rem;
    padding: 7px 13px 7px 32px; width: 210px; outline: none;
    transition: border-color .2s, background .2s;
  }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: rgba(255,255,255,0.28); background: rgba(255,255,255,0.08); }

  /* ── HERO ── */
  .hero {
    padding: 5rem 2.5rem 3.2rem;
    text-align: center; position: relative; overflow: hidden;
  }
  .hero::after {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255,255,255,0.01) 3px, rgba(255,255,255,0.01) 4px);
    pointer-events: none;
  }
  .hero-eyebrow { font-size: 0.68rem; letter-spacing: 0.52em; color: var(--muted); text-transform: uppercase; margin-bottom: 1rem; animation: fadeUp .55s ease both; }
  .hero-title {
    font-family: 'Orbitron', monospace; font-weight: 900;
    font-size: clamp(2.6rem, 7vw, 5.4rem); letter-spacing: 0.06em; line-height: 1.05;
    background: linear-gradient(160deg, #fff 25%, rgba(255,255,255,0.38) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    animation: fadeUp .55s .08s ease both; margin-bottom: 0.55rem;
  }
  .hero-desc { font-size: 1rem; color: var(--muted); letter-spacing: 0.09em; animation: fadeUp .55s .16s ease both; }

  /* ── TOOLBAR ── */
  .toolbar { padding: 2rem 2.5rem 1.6rem; display: flex; align-items: center; gap: 0.55rem; flex-wrap: wrap; }
  .toolbar-label { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--muted); text-transform: uppercase; margin-right: 0.4rem; }
  .chip {
    background: transparent; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); cursor: pointer; font-family: 'Rajdhani', sans-serif;
    font-size: 0.78rem; letter-spacing: 0.1em; padding: 5px 14px; text-transform: uppercase;
    transition: border-color .18s, color .18s, background .18s;
  }
  .chip:hover, .chip.active { border-color: rgba(255,255,255,0.38); color: #fff; background: rgba(255,255,255,0.06); }

  /* ── GRID ── */
  .grid-section { padding: 0 2.5rem 5rem; }
  #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1.1rem; }

  /* ── CARD ── */
  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: 13px;
    overflow: hidden; cursor: pointer; position: relative;
    transition: transform .24s cubic-bezier(.22,.61,.36,1), border-color .24s, box-shadow .24s;
    animation: fadeIn .38s ease both;
  }
  .card:hover {
    transform: translateY(-5px) scale(1.025);
    border-color: var(--border-h);
    box-shadow: 0 18px 44px rgba(0,0,0,0.65), 0 0 0 1px rgba(255,255,255,0.07);
  }
  .card-thumb {
    width: 100%; aspect-ratio: 16/10; object-fit: cover; display: block;
    background: #111; transition: filter .22s;
  }
  .card:hover .card-thumb { filter: brightness(1.1); }

  .card-overlay {
    position: absolute; top: 0; left: 0; right: 0;
    aspect-ratio: 16/10;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.48); opacity: 0; transition: opacity .2s;
  }
  .card:hover .card-overlay { opacity: 1; }
  .play-ring {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.11); border: 2px solid rgba(255,255,255,0.6);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(5px);
    transition: transform .18s, background .18s;
  }
  .card:hover .play-ring { transform: scale(1.1); background: rgba(255,255,255,0.2); }

  .card-label {
    padding: 9px 12px 11px;
    font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 0.88rem;
    letter-spacing: 0.05em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ── MODAL BACKDROP ── */
  #modal-backdrop {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,0.88);
    backdrop-filter: blur(12px);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; visibility: hidden;
    transition: opacity .28s, visibility .28s;
  }
  #modal-backdrop.open { opacity: 1; visibility: visible; }

  /* ── MODAL BOX ── */
  #modal-box {
    background: #080808;
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: 18px;
    width: min(94vw, 1060px);
    display: flex; flex-direction: column;
    overflow: hidden;
    box-shadow: 0 40px 100px rgba(0,0,0,0.9), 0 0 0 1px rgba(255,255,255,0.04);
    transform: scale(.93) translateY(24px);
    transition: transform .3s cubic-bezier(.22,.61,.36,1);
  }
  #modal-backdrop.open #modal-box { transform: scale(1) translateY(0); }

  /* ── MODAL TOPBAR ── */
  .modal-topbar {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    background: rgba(255,255,255,0.025);
    border-bottom: 1px solid rgba(255,255,255,0.07);
    flex-shrink: 0;
  }

  .modal-game-name {
    font-family: 'Orbitron', monospace; font-weight: 700;
    font-size: 0.8rem; letter-spacing: 0.16em; color: #fff;
    flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* volume */
  .vol-group { display: flex; align-items: center; gap: 7px; flex-shrink: 0; }
  .vol-icon-btn {
    background: none; border: none; cursor: pointer; padding: 0;
    display: flex; align-items: center; opacity: .65; transition: opacity .15s;
  }
  .vol-icon-btn:hover { opacity: 1; }

  #vol-slider {
    -webkit-appearance: none; appearance: none;
    width: 88px; height: 3px; border-radius: 3px; outline: none; cursor: pointer;
    background: linear-gradient(to right, rgba(255,255,255,0.85) var(--vol,100%), rgba(255,255,255,0.15) var(--vol,100%));
  }
  #vol-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 13px; height: 13px; border-radius: 50%;
    background: #fff; cursor: pointer;
    box-shadow: 0 0 6px rgba(255,255,255,0.5);
    transition: transform .15s;
  }
  #vol-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }
  #vol-slider::-moz-range-thumb {
    width: 13px; height: 13px; border-radius: 50%; border: none; background: #fff; cursor: pointer;
  }

  /* icon buttons */
  .icon-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; color: #fff; cursor: pointer;
    width: 32px; height: 32px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    transition: background .17s, border-color .17s;
  }
  .icon-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); }

  /* ── GAME IFRAME ── */
  #game-iframe {
    width: 100%; aspect-ratio: 16/9;
    border: none; display: block; background: #000;
    flex-shrink: 0;
  }

  /* ── FOOTER ── */
  footer {
    position: relative; z-index: 1;
    border-top: 1px solid var(--border);
    padding: 1.4rem 2.5rem;
    text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.22em;
    color: var(--muted);
    text-transform: uppercase;
  }
  footer span { color: rgba(255,255,255,0.65); }

  /* ── KEYFRAMES ── */
  @keyframes fadeUp  { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:none; } }
  @keyframes fadeIn  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  @media(max-width:600px){
    header { padding: 0 1.1rem; }
    .hero  { padding: 3rem 1.1rem 2rem; }
    .toolbar, .grid-section { padding-left: 1.1rem; padding-right: 1.1rem; }
    #search { width: 150px; }
    #grid { grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); }
    #modal-box { width: 99vw; border-radius: 10px; }
    #vol-slider { width: 60px; }
  }
</style>
</head>
<body>

<!-- FIREFLIES -->
<canvas id="canvas"></canvas>

<!-- GAME MODAL -->
<div id="modal-backdrop">
  <div id="modal-box">
    <div class="modal-topbar">
      <span class="modal-game-name" id="modal-title">Game</span>
      <div class="vol-group">
        <button class="vol-icon-btn" id="mute-btn" title="Toggle mute" aria-label="Mute">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6H4.5L8.5 2.5v12L4.5 11H2a.5.5 0 01-.5-.5v-4A.5.5 0 012 6z" fill="white"/>
            <path id="vw1" d="M10.5 6a3.2 3.2 0 010 5.2" stroke="white" fill="none" stroke-width="1.4" stroke-linecap="round"/>
            <path id="vw2" d="M12.2 4a6 6 0 010 9.2" stroke="white" fill="none" stroke-width="1.4" stroke-linecap="round"/>
            <path id="vx" d="M10.5 6.5l4 4M14.5 6.5l-4 4" stroke="white" stroke-width="1.5" stroke-linecap="round" style="display:none"/>
          </svg>
        </button>
        <input type="range" id="vol-slider" min="0" max="100" value="100" aria-label="Volume"/>
      </div>
      <button class="icon-btn" id="fs-btn" title="Fullscreen" aria-label="Fullscreen">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="white" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
          <path d="M1 5V1h4M9 1h4v4M13 9v4H9M5 13H1V9"/>
        </svg>
      </button>
      <button class="icon-btn" id="modal-close" title="Close" aria-label="Close">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="white" stroke-width="1.9" stroke-linecap="round">
          <path d="M1 1l9 9M10 1L1 10"/>
        </svg>
      </button>
    </div>
    <iframe id="game-iframe"
      allowfullscreen
      allow="fullscreen *; autoplay *; pointer-lock *"
      sandbox="allow-scripts allow-same-origin allow-forms allow-pointer-lock allow-popups allow-modals">
    </iframe>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <a class="logo" href="#">
      <svg class="logo-icon" viewBox="0 0 38 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="9" width="36" height="22" rx="11" stroke="white" stroke-width="1.8"/>
        <rect x="6.5" y="17" width="9" height="3" rx="1.5" fill="white" opacity=".9"/>
        <rect x="9.5" y="14" width="3" height="9" rx="1.5" fill="white" opacity=".9"/>
        <circle cx="27"   cy="16.5" r="2"   fill="white" opacity=".5"/>
        <circle cx="31"   cy="20"   r="2"   fill="white" opacity=".9"/>
        <circle cx="27"   cy="23.5" r="2"   fill="white" opacity=".5"/>
        <circle cx="23"   cy="20"   r="2"   fill="white" opacity=".5"/>
        <circle cx="17.5" cy="20"   r="1.2" fill="white" opacity=".38"/>
        <circle cx="20.5" cy="20"   r="1.2" fill="white" opacity=".38"/>
      </svg>
      <div class="logo-text">
        <span class="logo-main">G4M3V4ULT</span>
        <span class="logo-sub">Game Vault</span>
      </div>
    </a>
    <div class="header-right">
      <span class="count-badge" id="count-badge">0 games</span>
      <div class="search-wrap">
        <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
          <circle cx="6" cy="6" r="4.5" stroke="white" stroke-width="1.5"/>
          <path d="M10 10L13 13" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="search" type="text" placeholder="Search games…" autocomplete="off" spellcheck="false"/>
      </div>
    </div>
  </header>

  <section class="hero">
    <p class="hero-eyebrow">Your personal arcade</p>
    <h1 class="hero-title">G4M3V4ULT</h1>
    <p class="hero-desc">Every game. One vault.</p>
  </section>

  <div class="toolbar">
    <span class="toolbar-label">Sort</span>
    <button class="chip active" data-sort="default">Default</button>
    <button class="chip" data-sort="az">A → Z</button>
    <button class="chip" data-sort="za">Z → A</button>
  </div>

  <section class="grid-section">
    <div id="grid"></div>
    <div id="empty" style="display:none; text-align:center; padding:4rem 2rem; color:var(--muted); font-size:1rem; letter-spacing:0.1em;">No games found.</div>
  </section>
</div>

<footer>
  Made by <span>VXII</span> x <span>Mohammad</span>
</footer>

<script>
/* ═══════════════════════════════════════════════════════
   🎮 ADD YOUR GAMES HERE
   Copy one block and fill in your own values:
     name  — display name shown under the card
     cover — URL to the thumbnail/cover image
     url   — the embed/game URL that loads inside the popup

   Example:
   { name: "My Game", cover: "https://i.imgur.com/xxxx.png", url: "https://example.com/game" },
═══════════════════════════════════════════════════════ */
const GAMES = [

  // ── EXAMPLE GAME ── copy this block and edit it to add a new game
  {
    name:  "Bad Parenting 1",
    cover: "https://cdn.jsdelivr.net/gh/gn-math/covers@main/166.png",
    url:   "g/bp1.html"
  },

];
/* ═══════════════════════════════════════════════════════ */


/* ── FIREFLIES ── */
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let W, H, pts = [];

function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }

function mkPt(){
  return {
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*1.7+0.35,
    vx:(Math.random()-.5)*.2,
    vy:(Math.random()-.5)*.2-.07,
    a: Math.random(),
    da:(Math.random()*.006+.002)*(Math.random()<.5?1:-1)
  };
}

function tick(){
  ctx.clearRect(0,0,W,H);
  for(const p of pts){
    p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
    if(p.a<0) p.da=Math.abs(p.da);
    if(p.a>1) p.da=-Math.abs(p.da);
    if(p.y<-8) p.y=H+8;
    if(p.x<-8) p.x=W+8;
    if(p.x>W+8) p.x=-8;
    const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*5);
    g.addColorStop(0,`rgba(255,255,255,${p.a*.16})`);
    g.addColorStop(1,'rgba(255,255,255,0)');
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r*5,0,Math.PI*2); ctx.fillStyle=g; ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${p.a*.88})`; ctx.fill();
  }
  requestAnimationFrame(tick);
}

resize();
pts = Array.from({length:130}, mkPt);
tick();
window.addEventListener('resize', resize);


/* ── RENDER GRID ── */
const FB = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='400' height='250'><rect fill='%23111' width='400' height='250'/><text fill='rgba(255,255,255,.18)' font-size='38' x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle'>▶</text></svg>`;

let sortMode = 'default', searchQ = '';

function filtered(){
  let list = [...GAMES];
  if(searchQ){ const q=searchQ.toLowerCase(); list=list.filter(g=>g.name.toLowerCase().includes(q)); }
  if(sortMode==='az') list.sort((a,b)=>a.name.localeCompare(b.name));
  if(sortMode==='za') list.sort((a,b)=>b.name.localeCompare(a.name));
  return list;
}

function render(){
  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const badge = document.getElementById('count-badge');
  const list  = filtered();

  badge.textContent = GAMES.length + (GAMES.length === 1 ? ' game' : ' games');
  grid.innerHTML = '';

  if(!list.length){ empty.style.display='block'; return; }
  empty.style.display='none';

  list.forEach((game, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.style.animationDelay = `${Math.min(i*.05,.5)}s`;
    card.innerHTML = `
      <img class="card-thumb" src="${game.cover}" alt="${game.name}" loading="lazy" onerror="this.src='${FB}'"/>
      <div class="card-overlay">
        <div class="play-ring">
          <svg width="17" height="17" viewBox="0 0 17 17" fill="white"><path d="M4.5 2.5l10 5.5-10 5.5V2.5z"/></svg>
        </div>
      </div>
      <div class="card-label">${game.name}</div>`;
    card.addEventListener('click', () => openModal(game));
    grid.appendChild(card);
  });
}

render();


/* ── MODAL ── */
const backdrop   = document.getElementById('modal-backdrop');
const iframe     = document.getElementById('game-iframe');
const modalTitle = document.getElementById('modal-title');
const volSlider  = document.getElementById('vol-slider');
const muteBtn    = document.getElementById('mute-btn');
const fsBtn      = document.getElementById('fs-btn');
const closeBtn   = document.getElementById('modal-close');

let muted = false, lastVol = 100;

function openModal(game){
  modalTitle.textContent = game.name;
  iframe.src = game.url;
  backdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  muted=false; lastVol=100;
  volSlider.value=100;
  volSlider.style.setProperty('--vol','100%');
  setVolIcon(100);
}

function closeModal(){
  backdrop.classList.remove('open');
  document.body.style.overflow = '';
  setTimeout(()=>{ iframe.src=''; }, 300);
}

function trySetVol(v){
  try{
    const w = iframe.contentWindow;
    w.document.querySelectorAll('video,audio').forEach(el=>{ el.volume=v/100; el.muted=(v===0); });
  }catch(e){}
}

function setVolIcon(v){
  const w1=document.getElementById('vw1');
  const w2=document.getElementById('vw2');
  const vx=document.getElementById('vx');
  if(v==0){ w1.style.display='none'; w2.style.display='none'; vx.style.display=''; }
  else if(v<50){ w1.style.display=''; w2.style.display='none'; vx.style.display='none'; }
  else { w1.style.display=''; w2.style.display=''; vx.style.display='none'; }
}

muteBtn.addEventListener('click',()=>{
  muted=!muted;
  if(muted){ lastVol=+volSlider.value; volSlider.value=0; volSlider.style.setProperty('--vol','0%'); setVolIcon(0); trySetVol(0); }
  else      { volSlider.value=lastVol; volSlider.style.setProperty('--vol',lastVol+'%'); setVolIcon(lastVol); trySetVol(lastVol); }
});

volSlider.addEventListener('input',()=>{
  const v=+volSlider.value;
  volSlider.style.setProperty('--vol',v+'%');
  muted=(v===0); setVolIcon(v); trySetVol(v);
});

fsBtn.addEventListener('click',()=>{
  const req=iframe.requestFullscreen||iframe.webkitRequestFullscreen||iframe.mozRequestFullScreen;
  if(req) req.call(iframe);
});

closeBtn.addEventListener('click', closeModal);
backdrop.addEventListener('click', e=>{ if(e.target===backdrop) closeModal(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeModal(); });


/* ── SEARCH + SORT ── */
document.getElementById('search').addEventListener('input', e=>{ searchQ=e.target.value; render(); });
document.querySelectorAll('.chip').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.chip').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active'); sortMode=btn.dataset.sort; render();
  });
});
